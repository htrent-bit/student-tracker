<!DOCTYPE html>
<html>
<head>
    <title>Classroom Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; font-size: 1.2em; color: #4caf50; }
    </style>
</head>
<body>
    <h1>Student Check-Out</h1>
    <div id="reader"></div>
    <div id="status">Ready to scan...</div>

    <script>
        const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

        function onScanSuccess(decodedText) {
            document.getElementById('status').innerText = "Logging: " + decodedText;
            
            // Send data to Google Sheets via the Webhook
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ studentID: decodedText })
            })
            .then(() => {
                document.getElementById('status').innerText = "Logged Successfully!";
                setTimeout(() => { document.getElementById('status').innerText = "Ready to scan..."; }, 3000);
            })
            .catch(err => console.error("Error:", err));
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
