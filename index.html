<!DOCTYPE html>
<html>
<head>
    <title>Seamless Student Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        /* This makes the camera fill the screen */
        #reader { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover;
        } 
        /* A simple overlay to show status */
        #status-overlay { 
            position: absolute; 
            bottom: 40px; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px 30px; 
            border-radius: 30px; 
            font-size: 1.4em; 
            border: 2px solid #2196f3;
            z-index: 10;
        }
        .success-flash { 
            background: #2e7d32 !important; 
            border-color: #fff !important; 
        }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="status-overlay">Initializing Camera...</div>

    <script>
        const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";
        
        // 1. Initialize the core library (not the UI version)
        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false;

        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 280 } 
        };

        // 2. Start the camera automatically on page load
        html5QrCode.start(
            { facingMode: "user" }, 
            config, 
            onScanSuccess
        ).then(() => {
            document.getElementById('status-overlay').innerText = "Ready to Scan";
        }).catch(err => {
            document.getElementById('status-overlay').innerText = "Camera Error: Check Permissions";
        });

        function onScanSuccess(decodedText) {
            if (isProcessing) return; // Prevent "machine gun" logging
            
            isProcessing = true;
            const status = document.getElementById('status-overlay');
            
            // Visual feedback
            status.innerText = "Logged: " + decodedText;
            status.classList.add('success-flash');
            new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play();

            // Send to Google Sheets
            const finalUrl = SCRIPT_URL + "?studentID=" + encodeURIComponent(decodedText);
            fetch(finalUrl, { method: "POST", mode: 'no-cors' })
            .then(() => {
                // Wait 3 seconds before allowing the next scan
                setTimeout(() => {
                    status.innerText = "Ready to Scan";
                    status.classList.remove('success-flash');
                    isProcessing = false;
                }, 3000); 
            });
        }
    </script>
</body>
</html>
