<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner Kiosk</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #reader { width: 400px; height: 400px; border: 5px solid #333; border-radius: 20px; overflow: hidden; position: relative; }
        #status { margin-top: 20px; padding: 15px 30px; border-radius: 10px; background: #333; font-size: 1.2rem; }
        .success-bg { background: #2e7d32 !important; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="status">Initializing...</div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL DEPLOYMENT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFYVsERrkkQvG2rPKx96RoeTq5O9QkTyJ2zMfnCjkMMGO_PGYg6w2CHbpmmQ95IMU/exec"; 
        
        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false;

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            console.log("Scan detected: " + decodedText);
            
            // Visual/Audio Feedback
            document.getElementById('status').innerText = "Logging Student: " + decodedText;
            document.getElementById('status').classList.add('success-bg');
            new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play();

            // The "Pipe" to Google Sheets
            const finalUrl = SCRIPT_URL + "?studentID=" + encodeURIComponent(decodedText);
            
            fetch(finalUrl, { method: "POST", mode: 'no-cors' })
                .then(() => {
                    console.log("Data sent to Google");
                    setTimeout(() => {
                        document.getElementById('status').innerText = "Ready for Next Student";
                        document.getElementById('status').classList.remove('success-bg');
                        isProcessing = false;
                    }, 3000); // 3 second pause
                })
                .catch(err => {
                    console.error("Fetch Error:", err);
                    isProcessing = false;
                });
        }

        // Auto-start camera
        html5QrCode.start(
            { facingMode: "user" }, 
            { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
            onScanSuccess
        ).then(() => {
            document.getElementById('status').innerText = "Ready to Scan";
        }).catch(err => {
            document.getElementById('status').innerText = "Camera Error: Permission Denied";
            console.error(err);
        });
    </script>
</body>
</html>
