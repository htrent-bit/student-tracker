<!DOCTYPE html>
<html>
<head>
    <title>Classroom Scanner - Maroon & Gold</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #800000; /* Maroon Background */
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }

        /* Camera window: Small (250px) with Gold Border */
        #reader { 
            width: 250px; 
            height: 250px; 
            border: 6px solid #FFD700; /* Gold Border */
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            /* Added a gold glow effect */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); 
        }

        #status-overlay { 
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.6); 
            padding: 12px 35px; 
            border-radius: 50px; 
            font-size: 1.1em; 
            border: 1px solid #FFD700;
            transition: all 0.3s ease;
        }

        .success-flash { 
            background: #27ae60 !important; /* Green for success */
            border-color: white !important;
            transform: scale(1.1);
        }
    </style>
</head>
